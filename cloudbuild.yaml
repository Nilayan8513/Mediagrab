# Google Cloud Build configuration for CI/CD
# Triggers automatically on push to main branch when connected via Cloud Run console
# or via: gcloud builds triggers create github --repo-name=Mediagrab --repo-owner=Nilayan8513 --branch-pattern="^main$" --build-config=cloudbuild.yaml

steps:
  # Step 1: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/mediagrab:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/mediagrab:latest"
      - "."

  # Step 2: Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/mediagrab:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/mediagrab:latest"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "mediagrab"
      - "--image"
      - "gcr.io/$PROJECT_ID/mediagrab:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "300"
      - "--max-instances"
      - "5"
      - "--min-instances"
      - "0"

# Store the built image in GCR
images:
  - "gcr.io/$PROJECT_ID/mediagrab:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/mediagrab:latest"

# Build timeout (20 min — image has ffmpeg/python installs)
timeout: "1200s"

options:
  logging: CLOUD_LOGGING_ONLY
